<!doctype html>
<html lang="uk" dir="ltr" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Aleph Studio - Admin</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#0e0d0c">
    <meta name="color-scheme" content="dark light">
    <script>(function(){try{var t=localStorage.getItem('aleph-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t==='light'?'light':'dark';}}catch(e){}}());</script>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #080606;
        }
        html[data-theme="light"], html[data-theme="light"] body {
            background: #f5f0ee;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <iframe title="Aleph Studio Admin" src="../../admin/?lang=ua"></iframe>
</body>
</html>
