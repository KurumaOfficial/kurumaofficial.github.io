<style>
:root {
  --bg: #090807;
  --bg-soft: rgba(255,255,255,.04);
  --text: #f4efe6;
  --muted: #b9ad9e;
  --line: rgba(255,255,255,.1);
  --accent: #e9d0aa;
  --accent-strong: #f4dec2;
  --shadow: 0 24px 80px rgba(0,0,0,.42);
  --font-display: "Cormorant", serif;
  --font-body: "Karla", sans-serif;
  --font-ui: "Unbounded", sans-serif;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  color: var(--text);
  font-family: var(--font-body);
  background:
    radial-gradient(circle at top, rgba(233,208,170,.16), transparent 36%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.07), transparent 24%),
    var(--bg);
}
a { color: inherit; text-decoration: none; }
.shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px;
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-size: 12px;
}
.brand-mark {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--accent-strong), rgba(255,255,255,.22));
  box-shadow: 0 0 0 1px rgba(255,255,255,.15);
}
.nav-link {
  padding: 12px 18px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
}
.hero {
  width: min(100%, 920px);
  margin: auto;
  padding: 56px 40px;
  border: 1px solid var(--line);
  border-radius: 32px;
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  box-shadow: var(--shadow);
}
.eyebrow {
  margin: 0 0 18px;
  color: var(--accent);
  letter-spacing: .22em;
  text-transform: uppercase;
  font-size: 11px;
}
h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: clamp(46px, 8vw, 88px);
  line-height: .92;
  font-weight: 600;
}
p {
  max-width: 620px;
  margin: 22px 0 0;
  color: var(--muted);
  font-size: 18px;
  line-height: 1.7;
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 28px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  transition: transform .18s ease, border-color .18s ease, background-color .18s ease;
}
.btn:hover,
.btn:focus-visible {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,.22);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #171311;
  font-weight: 700;
}
.btn-secondary {
  background: rgba(255,255,255,.04);
}
@media (max-width: 720px) {
  .shell { padding: 18px; }
  .hero { padding: 32px 22px; border-radius: 24px; }
  p { font-size: 16px; }
}
</style>
</head>
<body>
<div class="shell">
  <nav class="nav" aria-label="Основная навигация">
    <a class="brand" href="../?view=showcase" aria-label="Aleph Studio — на главную">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Aleph Studio</span>
    </a>
    <a class="nav-link" href="../donate/">Поддержать</a>
  </nav>

  <main class="hero" id="main">
    <div class="eyebrow">Products Route</div>
    <h1>Каталог продуктов скоро появится</h1>
    <p>Этот маршрут уже зарезервирован под отдельную страницу продуктов. Пока здесь временная заглушка, чтобы ссылка работала корректно и не вела на ошибку.</p>
    <div class="actions">
      <a class="btn btn-primary" href="../?view=showcase#products">Вернуться к витрине</a>
      <a class="btn btn-secondary" href="../donate/">Открыть поддержку</a>
    </div>
  </main>
</div>
</body>
