<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://cdn.discordapp.com https://media.discordapp.net; connect-src 'self' https://api.github.com; base-uri 'self'; form-action 'self'; object-src 'none';">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">
<meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Aleph Studio - Admin</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#0e0d0c">
    <meta name="color-scheme" content="dark light">
    <script>(function(){try{var t=localStorage.getItem('aleph-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t==='light'?'light':'dark';}}catch(e){}}());</script>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #080606;
        }
        html[data-theme="light"], html[data-theme="light"] body {
            background: #f5f0ee;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <iframe title="Aleph Studio Admin" src="../../admin/?lang=en"></iframe>
</body>
</html>
