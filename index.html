<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function () {
      var raw = window.location.pathname || '/';
      var norm = raw.replace(/\/index\.html$/i, '/').toLowerCase();
      if (/^\/(ru|en|ua|uk)(?:\/|$)/.test(norm)) return;
      if (!(norm === '/' || norm === '')) return;
      var langs = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages : [navigator.language || ''];
      var target = '/en/';
      for (var i = 0; i < langs.length; i++) {
        var v = String(langs[i] || '').toLowerCase();
        if (v.indexOf('ru') === 0) { target = '/ru/'; break; }
        if (v.indexOf('uk') === 0 || v.indexOf('ua') === 0) { target = '/ua/'; break; }
        if (v.indexOf('en') === 0) { target = '/en/'; break; }
      }
      window.location.replace(target + (window.location.search || '') + (window.location.hash || ''));
    })();
  </script>
  <title>Aleph Studio</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
</head>
<body></body>
</html>
