    <title>Aleph Studio — Redirecting…</title>
    <meta name="robots" content="noindex">
    <meta name="description" content="Aleph Studio — independent product studio. A subsidiary of WeTTeA.">
    <!-- Social preview for bare-domain links (crawlers do not run JS) -->

    <!-- Instant redirect for JS-enabled browsers -->
    <script>
        (function () {
            'use strict';

            var supported = Object.create(null);
            supported.ru = './ru/';
            supported.en = './en/';
            supported.ua = './ua/';
            var fallback = supported.ru;

            /** Derive best locale from Accept-Language / navigator. */
            function detect() {
                var raw = (navigator.languages && navigator.languages.length
                    ? navigator.languages
                    : [navigator.language || ''])
                    .map(function (l) { return String(l || '').split('-')[0].toLowerCase(); });

                for (var i = 0; i < raw.length; i++) {
                    if (raw[i] === 'uk' || raw[i] === 'ua') return supported.ua;
                    if (Object.prototype.hasOwnProperty.call(supported, raw[i])) {
                        return supported[raw[i]];
                    }
                }
                return fallback;
            }

            var dest = new URL(detect(), location.href);
            dest.search = location.search;
            dest.hash = location.hash;
            location.replace(dest.toString());
        })();
    </script>

    <!-- Fallback for NoScript users -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=./ru/">
    </noscript>

    <style>

    </style>
</head>
<body>
    <p>Redirecting… <a href="./ru/">RU</a> · <a href="./en/">EN</a> · <a href="./ua/">UA</a></p>
