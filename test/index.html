<!doctype html>
<html lang="ru" dir="ltr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://cdn.discordapp.com https://media.discordapp.net https://*.giphy.com https://i.pinimg.com; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Donor cards — visual test route</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#080606">
<meta name="color-scheme" content="dark light">
<script>(function(){try{var t=localStorage.getItem('aleph-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;}}catch(e){}}());</script>
<link rel="icon" href="../favicon.ico" sizes="48x48">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Karla:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/support/donate.css?v=18">
<style>
    /* Test-route chrome only. Card visuals come 1:1 from donate.css +
     * createSupportCard() — never restyle the cards here. */
    .test-page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 48px 24px 96px;
    }
    .test-head {
        margin-bottom: 40px;
    }
    .test-head h1 {
        font-family: 'Unbounded', sans-serif;
        font-size: clamp(22px, 4vw, 36px);
        font-weight: 200;
        color: var(--text);
        margin-bottom: 10px;
    }
    .test-head p {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-dim);
    }
    .test-section-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 48px 0 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--accent-border);
    }
    .test-section-note {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 20px;
    }
    .test-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 24px;
        padding-top: 6px;
    }
    .test-grid--top {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .test-controls {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 100;
        display: flex;
        gap: 8px;
    }
    .test-controls button {
        padding: 10px 16px;
        border: 1px solid var(--accent-border);
        background: var(--surface);
        color: var(--text);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: .1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background .18s ease, border-color .18s ease;
    }
    .test-controls button:hover {
        background: var(--surface-h);
        border-color: var(--accent);
    }
    @media (max-width: 760px) {
        .test-grid--top { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
<div class="test-controls">
    <button id="toggleThemeBtn" type="button">Тема</button>
    <button id="toggleMotionBtn" type="button">FX: вкл</button>
</div>

<main class="test-page">
    <div class="test-head">
        <h1>Карточки донатеров — тестовый роут</h1>
        <p>Все карточки рендерятся реальным генератором createSupportCard() из src/support/donate.js — дизайн всегда актуален.</p>
    </div>
    <div id="testRoot"></div>
</main>

<script type="module">
import { createSupportCard } from '../src/support/donate.js?v=20260606a';

/* ── Fixtures: every tier, state and variant the generator supports ── */
const SECTIONS = [
    {
        label: 'Standard · Premium ($2–$99)',
        note: 'Без канвас-эффектов. Метка тира появляется от $10.',
        top: false,
        supporters: [
            { id: 't-std-min', name: 'Минимум', amountUsd: 2 },
            { id: 't-std-nomark', name: 'Без метки ($9)', amountUsd: 9 },
            { id: 't-std-mark', name: 'С меткой ($10)', amountUsd: 10 },
            { id: 't-std-long', name: 'Очень длинное имя пользователя для теста переполнения', amountUsd: 50 },
            { id: 't-std-avatar', name: 'С аватаром', amountUsd: 99, avatarUrl: '../assets/icons/favicon-32.png' },
        ],
    },
    {
        label: 'Gold ($100–$249)',
        note: 'Низкий уровень свечения, золотые слитки на канвасе.',
        top: false,
        supporters: [
            { id: 't-gold-1', name: 'Gold Basic', amountUsd: 100 },
            { id: 't-gold-2', name: 'Gold Mid', amountUsd: 150, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-gold-3', name: 'Gold High', amountUsd: 220 },
        ],
    },
    {
        label: 'Royal Gold ($250–$499)',
        note: 'Средний уровень свечения.',
        top: false,
        supporters: [
            { id: 't-royal-1', name: 'Royal Entry', amountUsd: 250 },
            { id: 't-royal-2', name: 'Royal Mid', amountUsd: 350, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-royal-3', name: 'Royal High', amountUsd: 480 },
        ],
    },
    {
        label: 'Mythic Gold ($500–$999)',
        note: 'Высокий уровень свечения, кольцо вокруг карточки, иконка auto_awesome.',
        top: false,
        supporters: [
            { id: 't-myth-1', name: 'Mythic Entry', amountUsd: 500 },
            { id: 't-myth-2', name: 'Mythic Mid', amountUsd: 750, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-myth-3', name: 'Mythic Max', amountUsd: 999 },
        ],
    },
    {
        label: 'Platinum ($1000+)',
        note: 'Платиновая палитра: звёзды, кометы, синее кольцо.',
        top: false,
        supporters: [
            { id: 't-plat-1', name: 'Platinum Entry', amountUsd: 1000 },
            { id: 't-plat-2', name: 'Platinum Mid', amountUsd: 2500, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-plat-3', name: 'Platinum Max', amountUsd: 10000 },
        ],
    },
    {
        label: 'Топ-3 (gold-палитра)',
        note: 'is-top + data-rank 1–3 — состояние секции «Общий топ 3».',
        top: true,
        supporters: [
            { id: 't-top-1', name: 'Топ #1', amountUsd: 900, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-top-2', name: 'Топ #2', amountUsd: 400 },
            { id: 't-top-3', name: 'Топ #3', amountUsd: 150 },
        ],
    },
    {
        label: 'Топ-3 (platinum)',
        note: 'Платиновые лидеры — is-top + is-platinum одновременно.',
        top: true,
        supporters: [
            { id: 't-ptop-1', name: 'Plat Top #1', amountUsd: 10000 },
            { id: 't-ptop-2', name: 'Plat Top #2', amountUsd: 7500, avatarUrl: '../assets/icons/favicon-32.png' },
            { id: 't-ptop-3', name: 'Plat Top #3', amountUsd: 1000 },
        ],
    },
    {
        label: 'Без эффектов (effectsEnabled: false)',
        note: 'Так рендерится дубль топ-донатера в общем списке.',
        top: false,
        effectsEnabled: false,
        supporters: [
            { id: 't-noeff-1', name: 'Gold без FX', amountUsd: 500 },
            { id: 't-noeff-2', name: 'Platinum без FX', amountUsd: 2000 },
        ],
    },
];

let effectsEnabled = true;

function renderAll() {
    const root = document.getElementById('testRoot');
    root.textContent = '';

    for (const section of SECTIONS) {
        const label = document.createElement('div');
        label.className = 'test-section-label';
        label.textContent = section.label;
        root.append(label);

        const note = document.createElement('p');
        note.className = 'test-section-note';
        note.textContent = section.note;
        root.append(note);

        const grid = document.createElement('div');
        grid.className = section.top ? 'test-grid test-grid--top top-grid' : 'test-grid supporters-grid';
        section.supporters.forEach((supporter, index) => {
            grid.append(createSupportCard(supporter, {
                rank: section.top ? index + 1 : 0,
                top: Boolean(section.top),
                locale: 'ru',
                effectsEnabled: effectsEnabled && section.effectsEnabled !== false,
            }));
        });
        root.append(grid);
    }

    /* Empty state */
    const emptyLabel = document.createElement('div');
    emptyLabel.className = 'test-section-label';
    emptyLabel.textContent = 'Пустое состояние';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Пока никто не поддержал проект. Когда появятся первые донаты, карточки покажутся здесь.';
    root.append(emptyLabel, empty);
}

document.getElementById('toggleThemeBtn').addEventListener('click', () => {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    html.style.colorScheme = next;
    try { localStorage.setItem('aleph-theme', next); } catch { /* private mode */ }
});

document.getElementById('toggleMotionBtn').addEventListener('click', (event) => {
    effectsEnabled = !effectsEnabled;
    event.currentTarget.textContent = effectsEnabled ? 'FX: вкл' : 'FX: выкл';
    renderAll();
});

renderAll();
</script>
</body>
</html>
